quarkus.http.root-path=/api/v1
quarkus.jackson.fail-on-unknown-properties=true
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Goofy-Do API
quarkus.smallrye-openapi.info-version=1.0
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger
# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=app
quarkus.datasource.password=secret
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/appdb
quarkus.datasource.jdbc.max-size=16
# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
# CORS
quarkus.http.cors.enabled=true
# Erlaubte Origins (React-Dev-Server)
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
# Erlaubte Methoden
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
# Erlaubte Header (typisch fŘr JSON + Auth)
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With
# Sichtbare Response-Header (optional)
quarkus.http.cors.exposed-headers=Location,Link
# Credentials nur wenn Cookies/Authorization gebraucht werden
quarkus.http.cors.access-control-allow-credentials=true