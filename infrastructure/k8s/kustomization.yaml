apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: goofydo

resources:
  - namespace.yaml
  - postgres.yaml
  - keycloak.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml

configMapGenerator:
  - name: postgres-init-sql
    files:
      - init.sql=files/postgres/init.sql

  - name: keycloak-realm-import
    files:
      - todo-realm.json=files/keycloak/todo-realm.json

generatorOptions:
  disableNameSuffixHash: true